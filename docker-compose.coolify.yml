version: "3.9"

# ── Coolify Deployment — App only, uses Coolify-managed PostgreSQL ────────────
#
# SETUP:
#  1. In Coolify → Databases → New Database → PostgreSQL 16
#  2. Copy the Internal Connection URL from the database resource
#  3. Set it as DATABASE_URL in this app's Environment Variables
#
# Required env vars → Coolify Environment Variables tab:
#
#   DATABASE_URL       Internal connection URL from Coolify PostgreSQL  (REQUIRED)
#   AGENT_EMAIL        inbox that receives quote alerts                 (REQUIRED)
#   APP_PORT           host port (default 3000 — change if taken)       (optional)
#   SMTP_HOST          e.g. smtp.gmail.com                              (optional)
#   SMTP_SENDER_EMAIL  e.g. noreply@yourdomain.com                     (optional)
#   SMTP_PASSWORD      SMTP / app password                              (optional)
# ─────────────────────────────────────────────────────────────────────────────

services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT:-5055}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT:        Production
      DOTNET_RUNNING_IN_CONTAINER:   "true"
      ASPNETCORE_URLS:               "http://+:8080"

      DatabaseProvider:              PostgreSQL
      # Paste the Coolify internal DB URL here via env var:
      ConnectionStrings__PostgreSQL: "${DATABASE_URL}"

      EmailSettings__SmtpHost:       ${SMTP_HOST:-}
      EmailSettings__SmtpPort:       ${SMTP_PORT:-587}
      EmailSettings__UseSsl:         ${SMTP_USE_SSL:-true}
      EmailSettings__SenderEmail:    ${SMTP_SENDER_EMAIL:-noreply@insurancehub.com}
      EmailSettings__SenderName:     InsuranceHub
      EmailSettings__SenderPassword: ${SMTP_PASSWORD:-}
      EmailSettings__AgentEmail:     ${AGENT_EMAIL:-}

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
