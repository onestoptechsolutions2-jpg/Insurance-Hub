version: "3.9"

# ── Coolify Deployment — builds from source, includes managed PostgreSQL ──────
# In Coolify:
#   Docker Compose Location → /docker-compose.coolify.yml
#   Then set Environment Variables (see list below)

services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-InsuranceHub}
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      ASPNETCORE_ENVIRONMENT:        Production
      DOTNET_RUNNING_IN_CONTAINER:   "true"
      ASPNETCORE_URLS:               "http://+:8080"

      # Database — built from the db service above
      DatabaseProvider:              PostgreSQL
      ConnectionStrings__PostgreSQL: "Host=db;Port=5432;Database=${POSTGRES_DB:-InsuranceHub};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD}"

      # Email — set these in Coolify Environment Variables
      EmailSettings__SmtpHost:       ${SMTP_HOST:-}
      EmailSettings__SmtpPort:       ${SMTP_PORT:-587}
      EmailSettings__UseSsl:         ${SMTP_USE_SSL:-true}
      EmailSettings__SenderEmail:    ${SMTP_SENDER_EMAIL:-noreply@insurancehub.com}
      EmailSettings__SenderName:     ${SMTP_SENDER_NAME:-InsuranceHub}
      EmailSettings__SenderPassword: ${SMTP_PASSWORD:-}
      EmailSettings__AgentEmail:     ${AGENT_EMAIL:-agent@insurancehub.com}

    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

volumes:
  pgdata:
